services:
  - type: web
    name: freia-flowise
    runtime: docker
    plan: starter
    region: oregon
    branch: main
    buildCommand: ""
    startCommand: ""
    healthCheckPath: /api/v1/ping
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      - key: PORT
        value: "10000"
      - key: HOST
        value: "0.0.0.0"
      - key: DATABASE_PATH
        value: "/opt/render/project/.flowise"
      - key: APIKEY_PATH
        value: "/opt/render/project/.flowise"
      - key: SECRETKEY_PATH
        value: "/opt/render/project/.flowise"
      - key: LOG_PATH
        value: "/opt/render/project/.flowise/logs"
      - key: BLOB_STORAGE_PATH
        value: "/opt/render/project/.flowise/storage"
      - key: DISABLE_FLOWISE_TELEMETRY
        value: "true"
      - key: SHOW_COMMUNITY_NODES
        value: "true"
      - key: CORS_ORIGINS
        value: "*"
      - key: IFRAME_ORIGINS
        value: "*"
      - key: FLOWISE_FILE_SIZE_LIMIT
        value: "50mb"
      - key: JWT_AUTH_TOKEN_SECRET
        generateValue: true
      - key: JWT_REFRESH_TOKEN_SECRET
        generateValue: true
      - key: JWT_ISSUER
        value: "FREIA_FLOWISE"
      - key: JWT_AUDIENCE
        value: "FREIA_USERS"
      - key: JWT_TOKEN_EXPIRY_IN_MINUTES
        value: "360"
      - key: JWT_REFRESH_TOKEN_EXPIRY_IN_MINUTES
        value: "43200"
    disk:
      name: freia-data
      mountPath: /opt/render/project/.flowise
      sizeGB: 1

databases: []